<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirecting...</title>

<script>
(function () {

    // Get query parameter safely
    function getParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name) || "";
    }

    // Get parameters
    var alpha = getParam("alpha");
    var bcda = getParam("bcda");

    // Store alpha if exists
    if (alpha !== "") {
        localStorage.setItem("alpha", alpha);
    }

    // If bcda missing → stop
    if (bcda === "") {
        document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Invalid Link</h2>";
        return;
    }

    // Detect OS (simple & reliable)
    var ua = navigator.userAgent.toLowerCase();
    var url = "";

    if (ua.includes("android")) {
        url = "andx010usahTml/index.html";
    } else if (ua.includes("iphone") || ua.includes("ipad") || ua.includes("ipod")) {
        url = "ioxs010usxhYMl/index.html";
    } else if (ua.includes("mac")) {
        url = "MerxiC0deinfousahtml/index.html";
    } else {
        url = "webC0deinfousavhtml/index.html";
    }

    // Redirect
    window.location.replace(url + "?bcda=" + encodeURIComponent(bcda));

})();
</script>

</head>
<body>

<p style="text-align:center;margin-top:50px;">Redirecting...</p>

</body>
</html>
